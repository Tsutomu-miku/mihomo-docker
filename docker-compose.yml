# ============================================================
# mihomo Docker + Sub-Store
# ============================================================
# Dashboard : http://<YOUR-IP>:9090/ui
# Sub-Store : http://<YOUR-IP>:3001
# ============================================================

services:
  mihomo:
    container_name: mihomo
    image: ghcr.io/tsutomu-miku/mihomo-docker:latest
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./config:/root/.config/mihomo
    depends_on:
      sub-store:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  sub-store:
    container_name: sub-store
    image: xream/sub-store:latest
    restart: unless-stopped
    network_mode: host
    environment:
      - SUB_STORE_CRON=0 */6 * * *
      - SUB_STORE_FRONTEND_BACKEND_PATH=/2cXaAxRGfddmGz2yx1wA
    volumes:
      - ./sub-store-data:/opt/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
