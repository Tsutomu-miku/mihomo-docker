# ============================================================
# mihomo Docker - All-in-One
# ============================================================
# Single container includes: mihomo + metacubexd + Sub-Store
#
# Dashboard  : http://<YOUR-IP>:9090/ui
# Sub-Store  : http://<YOUR-IP>:3002
# Proxy      : <YOUR-IP>:7890
# ============================================================

services:
  mihomo:
    container_name: mihomo
    image: ghcr.io/tsutomu-miku/mihomo-docker:latest
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=Asia/Shanghai
      # Sub-Store API path (acts as auth token, change for security)
      - SUB_STORE_FRONTEND_BACKEND_PATH=/2cXaAxRGfddmGz2yx1wA
    volumes:
      - ./config:/root/.config/mihomo
      - ./sub-store-data:/opt/sub-store/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
