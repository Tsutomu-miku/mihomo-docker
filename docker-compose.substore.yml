# ============================================================
# mihomo Docker - Advanced Setup with Sub-Store
# ============================================================
# Includes Sub-Store for web-based subscription management.
# Sub-Store UI: http://YOUR_IP:3001
# mihomo UI:    http://YOUR_IP:9090/ui
#
# For simple subscription needs, use docker-compose.yml instead
# and just edit proxy-providers in config.yaml.
# ============================================================

services:
  mihomo:
    container_name: mihomo
    image: ghcr.io/tsutomu-miku/mihomo-docker:latest
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./config:/root/.config/mihomo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # --------------------------------------------------------
  # Sub-Store: Web-based subscription manager
  # Features: merge providers, filter/rename nodes, auto-refresh
  # UI: http://YOUR_IP:3001
  # --------------------------------------------------------
  sub-store:
    container_name: sub-store
    image: xream/sub-store
    restart: unless-stopped
    environment:
      - SUB_STORE_CRON=0 */6 * * *
      - SUB_STORE_FRONTEND_BACKEND_PATH=/2cXaAxRGfddmGz2yx1wA
    ports:
      - "3001:3001"
    volumes:
      - ./sub-store-data:/opt/app/data
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # --------------------------------------------------------
  # subconverter (Optional): Subscription format converter
  # Converts v2ray/ssr/trojan URIs to Clash YAML format
  # API: http://localhost:25500/sub?target=clash&url=ENCODED_URL
  # Uncomment below if needed
  # --------------------------------------------------------
  # subconverter:
  #   container_name: subconverter
  #   image: tindy2013/subconverter:latest
  #   restart: unless-stopped
  #   ports:
  #     - "25500:25500"
