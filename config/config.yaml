# ============================================================
# mihomo Docker - Default Configuration
# ============================================================
# GitHub: https://github.com/Tsutomu-miku/mihomo-docker
# Wiki:   https://wiki.metacubex.one/
# ============================================================

# --- General Settings ---
mode: rule
mixed-port: 7890
allow-lan: true
bind-address: "*"
log-level: info
ipv6: false

# --- External Controller (API & Dashboard) ---
external-controller: 0.0.0.0:9090
external-ui: ui
# secret: ""  # Uncomment and set a secret for production use

# --- GEO Database Settings ---
# geodata-mode: true  => uses geoip.dat / geosite.dat (v2ray format)
# geodata-mode: false => uses country.mmdb (MaxMind format, default)
geodata-mode: true
geodata-loader: memconservative
geosite-matcher: mph
geo-auto-update: true
geo-update-interval: 24

# Custom GEO download URLs (CDN mirrors for reliable access)
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

# --- Profile Settings ---
profile:
  store-selected: true
  store-fake-ip: true

# --- DNS Configuration ---
# Layered design to avoid chicken-and-egg problem:
#   default-nameserver -> resolves DoH/DoT server domains
#   proxy-server-nameserver -> resolves proxy node hostnames (direct, no proxy)
#   nameserver -> primary DNS for all other queries
#   fallback -> anti-pollution DNS (overseas servers)
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true

  # Bootstrap DNS - MUST be plain IP addresses (no domains!)
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8

  # Proxy server DNS - resolves proxy node hostnames via DIRECT
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # Primary DNS servers
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  # Fallback DNS (anti-pollution, overseas)
  fallback:
    - tls://8.8.4.4
    - tls://1.1.1.1

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

  # Direct connection DNS
  direct-nameserver:
    - system

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"

# --- Proxies ---
# Add your proxy servers here. Example:
# proxies:
#   - name: "My Server"
#     type: ss
#     server: your-server.com
#     port: 8388
#     cipher: aes-256-gcm
#     password: "your-password"

# --- Proxy Groups ---
# proxy-groups:
#   - name: "Proxy"
#     type: select
#     proxies:
#       - "My Server"
#       - DIRECT

# --- Rules ---
rules:
  - GEOSITE,private,DIRECT
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,DIRECT
