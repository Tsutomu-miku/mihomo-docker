# --- DNS Configuration ---
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8

  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

  fallback:
    - tls://8.8.4.4
    - tls://1.1.1.1

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

  direct-nameserver:
    - system

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"

# --- Rules ---
# Uncomment and adjust when using proxy-groups above
# rules:
#   - GEOSITE,category-ads-all,REJECT
#   - GEOSITE,youtube,Streaming
#   - GEOSITE,netflix,Streaming
#   - GEOSITE,disney,Streaming
#   - GEOSITE,google,Proxy
#   - GEOSITE,github,Proxy
#   - GEOSITE,telegram,Proxy
#   - GEOSITE,twitter,Proxy
#   - GEOSITE,facebook,Proxy
#   - GEOSITE,openai,Proxy
#   - GEOSITE,private,DIRECT
#   - GEOSITE,cn,DIRECT
#   - GEOIP,CN,DIRECT,no-resolve
#   - MATCH,Proxy

# Default rules (no proxy configured)
rules:
  - GEOSITE,private,DIRECT
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,DIRECT
