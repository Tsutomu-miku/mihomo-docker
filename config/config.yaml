# ============================================================
# mihomo Docker - Default Configuration
# ============================================================
# Subscriptions : managed via Sub-Store UI at http://<IP>:3001
# Proxy control : via metacubexd Dashboard at http://<IP>:9090/ui
# ============================================================

# ========================
# General
# ========================
mode: rule
mixed-port: 7890
allow-lan: true
bind-address: "*"
log-level: info
ipv6: false

# ========================
# External Controller & Dashboard
# ========================
external-controller: 0.0.0.0:9090
external-ui: ui
# secret: ""

# ========================
# GEO Database
# ========================
geodata-mode: true
geodata-loader: memconservative
geosite-matcher: mph
geo-auto-update: true
geo-update-interval: 24

geox-url:
  geoip: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.metadb"
  asn: "https://cdn.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

# ========================
# Profile
# ========================
profile:
  store-selected: true
  store-fake-ip: true

# ========================
# DNS
# ========================
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "dns.msftncsi.com"
    - "www.msftncsi.com"
    - "www.msftconnecttest.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  fallback:
    - tls://8.8.4.4
    - tls://1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

# ============================================================
# Subscription (via Sub-Store)
# ============================================================
# Managed by Sub-Store UI at http://<YOUR-IP>:3001
#   1. Open Sub-Store → Add your subscription URLs
#   2. Create a Collection named "all"
#   3. Nodes will appear automatically in the dashboard
# ============================================================

proxy-providers:
  sub-store:
    type: http
    url: "http://127.0.0.1:3001/download/collection/all?target=ClashMeta"
    path: ./proxy_providers/sub-store.yaml
    interval: 21600
    proxy: DIRECT
    health-check:
      enable: true
      interval: 600
      url: https://www.gstatic.com/generate_204

# ========================
# Proxy Groups
# ========================
proxy-groups:
  - name: "Proxy"
    type: select
    use:
      - sub-store
    proxies:
      - Auto
      - DIRECT

  - name: "Auto"
    type: url-test
    use:
      - sub-store
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  # --------------------------------------------------------
  # Optional: Region-based groups (uncomment as needed)
  # --------------------------------------------------------
  # - name: "HongKong"
  #   type: url-test
  #   use:
  #     - sub-store
  #   filter: "(?i)港|HK|Hong"
  #   url: https://www.gstatic.com/generate_204
  #   interval: 300
  #
  # - name: "Japan"
  #   type: url-test
  #   use:
  #     - sub-store
  #   filter: "(?i)日|JP|Japan"
  #   url: https://www.gstatic.com/generate_204
  #   interval: 300
  #
  # - name: "USA"
  #   type: url-test
  #   use:
  #     - sub-store
  #   filter: "(?i)美|US|United States"
  #   url: https://www.gstatic.com/generate_204
  #   interval: 300
  #
  # - name: "Streaming"
  #   type: select
  #   use:
  #     - sub-store
  #   proxies:
  #     - HongKong
  #     - Japan
  #     - USA

# ========================
# Rules
# ========================
rules:
  - GEOSITE,private,DIRECT
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,Proxy
