# ============================================================
# mihomo Docker - Default Configuration
# ============================================================
# GitHub: https://github.com/Tsutomu-miku/mihomo-docker
# Wiki:   https://wiki.metacubex.one/
# ============================================================

# --- General Settings ---
mode: rule
mixed-port: 7890
allow-lan: true
bind-address: "*"
log-level: info
ipv6: false

# --- External Controller (API & Dashboard) ---
external-controller: 0.0.0.0:9090
external-ui: ui
# secret: ""  # Uncomment and set a secret for production use

# --- GEO Database Settings ---
geodata-mode: true
geodata-loader: memconservative
geosite-matcher: mph
geo-auto-update: true
geo-update-interval: 24

geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/GeoLite2-ASN.mmdb"

# --- Profile Settings ---
profile:
  store-selected: true
  store-fake-ip: true

# =============================================
# PROXY PROVIDERS (Subscription Support)
# =============================================
# mihomo natively supports fetching proxies from subscription URLs.
# Supports: Clash YAML, base64-encoded URI list, plain URI list.
#
# Uncomment and edit the section below to add your subscriptions.
# You can add multiple providers - they will all be merged.
#
# proxy-providers:
#   # --- Example: Airport subscription (Clash format) ---
#   airport1:
#     type: http
#     url: "https://your-provider.com/api/v1/client/subscribe?token=YOUR_TOKEN"
#     path: ./proxy_providers/airport1.yaml
#     interval: 3600                # Refresh every 1 hour
#     health-check:
#       enable: true
#       url: https://www.gstatic.com/generate_204
#       interval: 300               # Health check every 5 min
#       timeout: 5000
#       lazy: true                  # Only check nodes in use
#     override:
#       additional-prefix: "[Air1] " # Prefix for node names
#
#   # --- Example: Another subscription ---
#   airport2:
#     type: http
#     url: "https://another-provider.com/clash-sub"
#     path: ./proxy_providers/airport2.yaml
#     interval: 3600
#     health-check:
#       enable: true
#       url: https://www.gstatic.com/generate_204
#       interval: 300
#       timeout: 5000
#       lazy: true
#     # filter: "(?i)HK|JP|US"     # Optional: only keep matching nodes
#     # exclude-filter: "(?i)expire" # Optional: exclude matching nodes
#
#   # --- Example: Via subconverter (for non-Clash format subscriptions) ---
#   converted:
#     type: http
#     url: "http://localhost:25500/sub?target=clash&url=https%3A%2F%2Fv2ray-provider.com%2Fsub"
#     path: ./proxy_providers/converted.yaml
#     interval: 3600
#     health-check:
#       enable: true
#       url: https://www.gstatic.com/generate_204
#       interval: 300

