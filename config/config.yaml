# ============================================================
# mihomo Default Configuration
# Documentation: https://wiki.metacubex.one/
# ============================================================

# ----- General Settings -----
mixed-port: 7890           # HTTP(S) and SOCKS5 on same port
socks-port: 7891           # Dedicated SOCKS5 port
allow-lan: true            # Required for Docker: allow LAN connections
bind-address: "*"          # Bind to all interfaces
mode: rule                 # rule / global / direct
log-level: info            # silent / error / warning / info / debug
ipv6: true                 # Enable IPv6 support

# ----- External Controller & Web UI -----
external-controller: 0.0.0.0:9090   # RESTful API listen address
external-ui: ui                       # Relative path -> resolves to /root/.config/mihomo/ui
secret: ""                            # API access secret (empty for first setup, CHANGE this!)

# ----- Advanced Settings -----
unified-delay: true        # Unify delay calculation for display
tcp-concurrent: true       # Enable TCP concurrent handshake
geodata-mode: true         # Use GeoData for geo matching (recommended)
geodata-loader: standard   # GeoData loader: standard / memconservative
geo-auto-update: true      # Auto-update geo databases
geo-update-interval: 24    # Update interval in hours

find-process-mode: strict  # Process matching mode
global-client-fingerprint: chrome  # TLS fingerprint

# ----- Profile Settings -----
profile:
  store-selected: true     # Persist selected proxy across restarts
  store-fake-ip: true      # Persist fake-ip mapping

# ----- Sniffer (Traffic Detection) -----
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# ----- DNS Configuration -----
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "dns.msftncsi.com"
    - "www.msftncsi.com"
    - "+.stun.*.*"
    - "+.stun.*.*.*"
    - "+.stun.*.*.*.*"
    - "+.stun.*.*.*.*.*"
    - "lens.l.google.com"
    - "stun.l.google.com"
    - "time.windows.com"
    - "time.nist.gov"
    - "time.apple.com"
    - "time.cloudflare.com"
    - "ntp.ubuntu.com"
    - "ntp.aliyun.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 1.0.0.1
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
    - tls://1.0.0.1:853
    - tls://8.8.4.4:853
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4

# ----- TUN Mode (optional, requires NET_ADMIN) -----
# tun:
#   enable: true
#   stack: system          # system / gvisor / mixed
#   dns-hijack:
#     - any:53
#   auto-route: true
#   auto-detect-interface: true

# ============================================================
# Proxy Configuration (Add your own proxies here)
# ============================================================

# ----- Proxy Providers (Subscription) -----
# Uncomment and edit to use subscription-based providers:
#
# proxy-providers:
#   my-provider:
#     type: http
#     url: "https://your-subscription-url"
#     interval: 3600
#     path: ./providers/my-provider.yaml
#     health-check:
#       enable: true
#       interval: 600
#       url: https://www.gstatic.com/generate_204

# ----- Individual Proxies -----
# Uncomment and configure your proxy servers:
#
# proxies:
#   - name: "My-SS"
#     type: ss
#     server: example.com
#     port: 443
#     cipher: aes-256-gcm
#     password: "your-password"
#
#   - name: "My-VMess"
#     type: vmess
#     server: example.com
#     port: 443
#     uuid: "your-uuid"
#     alterId: 0
#     cipher: auto
#     tls: true
#
#   - name: "My-Trojan"
#     type: trojan
#     server: example.com
#     port: 443
#     password: "your-password"

# ----- Proxy Groups -----
# Uncomment and configure proxy groups:
#
# proxy-groups:
#   - name: "Proxy"
#     type: select
#     proxies:
#       - DIRECT
#       # - My-SS
#       # - My-VMess
#       # - My-Trojan
#
#   - name: "Auto"
#     type: url-test
#     proxies:
#       - DIRECT
#       # - My-SS
#       # - My-VMess
#     url: "https://www.gstatic.com/generate_204"
#     interval: 300

# ============================================================
# Rules
# ============================================================
rules:
  # ----- Custom Rules (Add above MATCH) -----
  # - DOMAIN-SUFFIX,google.com,Proxy
  # - DOMAIN-SUFFIX,github.com,Proxy
  # - GEOSITE,geolocation-!cn,Proxy
  # - GEOIP,CN,DIRECT

  # ----- Final Rule: All unmatched traffic -----
  - MATCH,DIRECT
