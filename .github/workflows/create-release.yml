# One-time workflow to create v1.0.0 release
# This workflow runs on push to main and creates the release,
# then the v* tag will trigger docker-build.yml
# This file can be deleted after the release is created.

name: Create Release v1.0.0

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/create-release.yml'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "v1.0.0 - Initial Release"
          body: |
            ## \U0001F389 mihomo-docker v1.0.0

            First official release of **mihomo-docker** — a Docker all-in-one proxy solution.

            ### Components
            | Component | Version | Description |
            |-----------|---------|-------------|
            | **mihomo** | Alpha (latest) | Clash.Meta proxy kernel with full protocol support |
            | **metacubexd** | v1.243.0 | Modern, responsive Web UI dashboard |
            | **Alpine Linux** | latest | Lightweight container runtime |

            ### Features
            - \U0001F433 Single Docker image with proxy kernel + Web UI
            - \U0001F310 Multi-platform support: `linux/amd64`, `linux/arm64`, `linux/arm/v7`
            - \U0001F527 Sensible default configuration with DNS/Fake-IP/Sniffer
            - \U0001F4CA Beautiful metacubexd dashboard at `http://host:9090/ui`
            - \U0001F504 Auto health check and restart policy

            ### Quick Start
            ```bash
            docker compose up -d
            ```

            ### Docker Image
            ```
            ghcr.io/tsutomu-miku/mihomo-docker:v1.0.0
            ghcr.io/tsutomu-miku/mihomo-docker:latest
            ```
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
