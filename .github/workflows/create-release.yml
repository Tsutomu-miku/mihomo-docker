name: Create Release Tag
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create v1.1.0 tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a v1.1.0 -m "v1.1.0: Fix geo database errors and UI accessibility"
          git push origin v1.1.0
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0
          name: "v1.1.0 - Fix GEO & UI Issues"
          body: |
            ## What's Changed

            ### Bug Fixes
            - **Fixed GEO database errors**: Pre-download all 5 geo database files (geoip.dat, geosite.dat, geoip.metadb, country.mmdb, GeoLite2-ASN.mmdb) during Docker build
            - **Fixed UI not accessible**: Improved entrypoint script with robust file recovery from backup locations
            - **Fixed DNS chicken-and-egg problem**: Added layered DNS configuration with `proxy-server-nameserver` and `default-nameserver` (plain IPs only)

            ### Improvements
            - Added dedicated geo database download stage in Dockerfile
            - Added CDN mirrors (testingcf.jsdelivr.net) for geo auto-update
            - Changed `geodata-loader` from `standard` to `memconservative` (official recommended)
            - Added `geosite-matcher: mph` for faster matching
            - Auto-recovery for both UI files AND geo database files on volume mount
            - Better startup banner showing geo file status
            - Proper Docker health checks and log rotation

            ### Docker Image
            ```bash
            docker pull ghcr.io/tsutomu-miku/mihomo-docker:v1.1.0
            docker pull ghcr.io/tsutomu-miku/mihomo-docker:latest
            ```

            **Full Changelog**: https://github.com/Tsutomu-miku/mihomo-docker/compare/v1.0.0...v1.1.0
          draft: false
          prerelease: false
      - name: Self-cleanup
        run: |
          gh api -X DELETE repos/${{ github.repository }}/contents/.github/workflows/create-release.yml \
            -f message="chore: cleanup release workflow" \
            -f branch=main \
            -f sha=$(gh api repos/${{ github.repository }}/contents/.github/workflows/create-release.yml --jq '.sha')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
