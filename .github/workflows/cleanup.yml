# One-time cleanup workflow: delete accidental v1.0.0 branch
# and then delete this workflow file and the create-release.yml
# Triggers on push to main with changes to this file

name: Cleanup

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cleanup.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete accidental v1.0.0 branch
        run: |
          # Delete the v1.0.0 branch (it should be a tag, not a branch)
          response=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/v1.0.0")
          if [ "$response" = "204" ]; then
            echo "Successfully deleted v1.0.0 branch"
          else
            echo "Failed to delete v1.0.0 branch (HTTP $response) - may not exist"
          fi

      - name: Remove one-time workflow files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f .github/workflows/create-release.yml || true
          git rm -f .github/workflows/cleanup.yml || true
          git commit -m "chore: clean up one-time release and cleanup workflows" || echo "Nothing to commit"
          git push origin main || echo "Push failed"
