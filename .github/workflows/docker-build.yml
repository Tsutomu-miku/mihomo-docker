# ============================================================
# GitHub Actions: Build and Push Docker Image
# Triggers: push to main, version tags, manual dispatch
# Platforms: linux/amd64, linux/arm64, linux/arm/v7
# Registry: GitHub Container Registry (ghcr.io)
# ============================================================

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mihomo_version:
        description: "mihomo branch/tag to build from"
        required: false
        default: "Alpha"

permissions:
  contents: read
  packages: write

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: tsutomu-miku/mihomo-docker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # 1. Checkout repository
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Set up QEMU for multi-platform builds
      # --------------------------------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # --------------------------------------------------
      # 3. Set up Docker Buildx
      # --------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --------------------------------------------------
      # 4. Log in to GitHub Container Registry
      # --------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --------------------------------------------------
      # 5. Extract metadata (tags, labels)
      # --------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag "latest" on default branch pushes
            type=raw,value=latest,enable={{is_default_branch}}
            # Semantic version from git tags (v1.2.3 -> 1.2.3)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Short commit SHA
            type=sha,prefix=,format=short

      # --------------------------------------------------
      # 6. Build and push multi-platform image
      # --------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --------------------------------------------------
      # 7. Output image digest
      # --------------------------------------------------
      - name: Image digest
        run: echo "Image digest ${{ steps.meta.outputs.tags }}"
